name: Deploy Backend To AWS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build application bundle
        run: |
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "node_modules/*" \
            -x "AWSCLIV2.pkg" \
            -x "deploy.zip"

      - name: Deploy to Elastic Beanstalk
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
          EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
        run: |
          VERSION_LABEL="${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          EB_BUCKET="elasticbeanstalk-${AWS_REGION}-${ACCOUNT_ID}"
          S3_KEY="${EB_APPLICATION_NAME}/${VERSION_LABEL}.zip"

          aws s3 cp deploy.zip "s3://${EB_BUCKET}/${S3_KEY}"

          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle S3Bucket="${EB_BUCKET}",S3Key="${S3_KEY}"

          aws elasticbeanstalk update-environment \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${VERSION_LABEL}"

          aws elasticbeanstalk wait environment-updated \
            --environment-names "${EB_ENVIRONMENT_NAME}"

      - name: Print environment URL
        env:
          EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
        run: |
          aws elasticbeanstalk describe-environments \
            --environment-names "${EB_ENVIRONMENT_NAME}" \
            --query 'Environments[0].CNAME' \
            --output text
